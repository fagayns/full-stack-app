name: CI
on:
  push:
    branches: [main]
jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install backend deps
        run: |
          cd backend
          npm install
      - name: Run tests
        run: |
          cd backend
          npm test
